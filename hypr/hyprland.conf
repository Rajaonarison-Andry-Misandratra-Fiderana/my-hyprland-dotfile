#######################
### 1. GENERAL      ###
#######################
misc {
    vfr = true
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    enable_swallow = true
}
render{
    new_render_scheduling = true
}
#######################
### 2. MONITORS     ###
#######################
monitorv2 {
    output = eDP-1
    mode = 1920x1080@60
    position = 0x0
    scale = 1
    transform = 0
}

monitorv2 {
    output = HDMI-A-4
    mode = 1920x1080@60
    position = 1920x0
    scale = 1
    transform = 0
}

#######################
### 3. ENVIRONMENT ###
#######################
###for nvidia GPU
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
env = SDL_VIDEODRIVER,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __NV_PRIME_RENDER_OFFLOAD,1
env = TERMINAL,kitty
env = BROWSER,zen-browser
env = FILEMANAGER,thunar
env = EDITOR,nvim


cursor {
    no_hardware_cursors = true
}

#######################
### 4. AUTOSTART    ###
#######################
#exec-once = hyprlock
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = swaync
exec-once = swayosd-server
exec-once = hyprpaper
exec-once = ~/.config/hypr/scripts/xdg-portal.sh
exec-once = ~/.config/hypr/scripts/sleepmanager.sh
exec-once = ~/.config/hypr/scripts/waybar-supervisor.sh
exec-once = systemctl --user start hyprpolkitagent

exec-once = walker --gapplication-service
exec-once = elephant
exec-once = nm-applet
exec-once = waypaper --restore

#######################
### 5. PROGRAMS     ###
#######################
$launcher = walker
$terminal = kitty
$fileManager = thunar
$browser = zen-browser
$note = obsidian
$PowerMenu = wlogout

$fullscreen = hyprctl dispatch fullscreen 1
$exclusiveFullscreen = hyprctl dispatch fullscreen toggle

#######################
### 6. XWAYLAND     ###
#######################
xwayland {
    force_zero_scaling = true
}

#######################
### 7. GENERAL      ###
#######################
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 3
    resize_on_border = false
    allow_tearing = true
    layout = master
    col.active_border = rgba(255,255,255,0.3)
    col.inactive_border = rgba(0,0,0,0.1)
}

#######################
### 8. DECORATION   ###
#######################
decoration {
    rounding = 0
    active_opacity = 1
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 4
        passes = 1
        new_optimizations = on
        ignore_opacity = true
    }
    shadow {
        enabled = false
        range = 3
        render_power = 1
        color = rgba(00000066)
    }
}

#######################
### 9. ANIMATIONS   ###
#######################
animations {
    enabled = true

    bezier = insaneFast, 0.1, 0.9, 0.1, 1.0 
    bezier = quickJolt, 0.4, 0.0, 0.2, 1.0 
    bezier = snap, 0.0, 0.7, 0.3, 1.0 

    animation = windows, 1, 3, insaneFast, slide, 5% 
    animation = windowsIn, 1, 3, insaneFast, slide, 5%
    animation = windowsOut, 1, 3, insaneFast, slide, 5%
    animation = windowsMove, 1, 3, quickJolt 

    animation = fade, 1, 4, snap 

    animation = workspaces, 1, 4, quickJolt, slide, 10% 
    animation = specialWorkspace, 1, 3, snap, slidefade, 5%
}

##################
### 10. LAYOUT ###
##################
master {
    new_status = slave
    orientation = left
    mfact = 0.5
    inherit_fullscreen = true
    allow_small_split = true
    smart_resizing = true
}


#################
### 11. INPUT  ###
#################
input {
    kb_layout = us
    kb_variant = intl
    follow_mouse = 1
    numlock_by_default = true
    sensitivity = 0.5
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }
}
gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen


#####################
### 12. BINDS     ###
#####################
$mainMod = alt
bind = $mainMod, C, exec, $browser "https://gemini.google.com/app"
bind = $mainMod, S, exec, grim
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)"

bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod, F,exec, $exclusiveFullscreen
bind = $mainMod, Q, killactive
bind = $mainMod, T, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, B, exec, $browser
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, $launcher
bind = $mainMod, X, exec, $PowerMenu
bind = $mainMod, O, exec, $note
bind = $mainMod, W, exec, $fullscreen


bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod CTRL SHIFT, l, movefocus, l                                                                                                               
bind = $mainMod CTRL SHIFT, h, movefocus, r                                                                                                                    
bind = $mainMod CTRL SHIFT, k, movefocus, u                                                                                                                       
bind = $mainMod CTRL SHIFT, j, movefocus, d 

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

bind = $mainMod CTRL, left, exec, hyprctl dispatch layoutmsg rollnext
bind = $mainMod CTRL, right, exec, hyprctl dispatch layoutmsg rollprev
bind = $mainMod CTRL, up, exec, hyprctl dispatch layoutmsg swapwithmaster master
bind = $mainMod CTRL, down, exec, hyprctl dispatch layoutmsg swapwithmaster child

binde = $mainMod, F7, exec, swayosd-client --output-volume +2
binde = $mainMod, F6, exec, swayosd-client --output-volume -2
binde = $mainMod, F5, exec, swayosd-client --output-volume mute-toggle

binde = $mainMod, F4, exec, swayosd-client --brightness raise 2+
binde = $mainMod, F3, exec, swayosd-client --brightness lower 2-

############################
### 13. WINDOWS & RULES  ###
############################
windowrule = workspace 1, class:zen|google-chrome|firefox|Brave-browser|Chromium
windowrule = workspace 2, class:Code|dev.zed.Zed|Godot|blender
windowrule = workspace 3, class:vlc|mpv|spotify
windowrule = workspace 5, class:heroic|steam|Lutris
windowrule = workspace 6, class:discord|telegram|whatsapp|signal
windowrule = workspace 7, class:htop|btop|glances



windowrulev2 = float, center, class:^(kitty|thunar|org\.pulseaudio\.pavucontrol|feh|blueman-manager)$
windowrulev2 = size 1600 900, class:^(thunar|feh)$
windowrulev2 = size 1280 600, class:^(org\.pulseaudio\.pavucontrol|blueman-manager)$
windowrulev2 = opacity 9.8 override, class:^(Code|kitty|nvim|ghostty|thunar)$
windowrulev2 = opacity 1, class:^(zen)$
windowrulev2 = opacity 0.95, class:^(discord|telegram|whatsapp)$
windowrulev2 = fullscreen, class:^(blender|heroic|steam|Godot|nvim)$
windowrulev2 = immediate, class:^(rofi)$
windowrulev2 = noblur, xwayland:1
windowrulev2 = noblur, class:^(thunar)$
